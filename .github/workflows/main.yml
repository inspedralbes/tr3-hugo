name: Despliegue a Producción

on:
  push:
    branches:
      - dev_prod

jobs:
  laravel-nuxt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v2

      - name: Instalar dependencias Laravel
        run: |
          cd web/back/laravel
          composer install
          cp .env.example .env  # Copia el archivo .env si no existe
          php artisan key:generate
          php artisan migrate --force  # Configuración de la base de datos Laravel

      - name: Verificar contenido del directorio actual
        run: ls

      - name: Instalar dependencias de Nuxt
        run: |
          cd web/nuxt
          pwd  # Añadido para verificar el directorio actual
          npm install

      - name: Verificar directorio actual en Nuxt
        run: ls
      
      - name: Debug Current Directory
        run: |
          pwd
          cd web/nuxt

      - name: Despliegue a Producción
        run: |
          echo "${{ secrets.PROD_KEY }}" > ~/prod_key.pem
          chmod 600 ~/prod_key.pem
          cd ${{ github.workspace }}
        
          cd web/back/laravel
          composer install --no-dev --optimize-autoloader
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan migrate --force
        
          cd ../../nuxt  # Update this line based on your directory structure
          npm install
          npm run build
          cd ${{ github.workspace }}
          scp -r -o stricthostkeychecking=no -o UserKnownHostsFile=/dev/null -i "~/prod_key.pem" ./web/* ${{secrets.PROD_USER }}@${{ secrets.PROD_HOST}}:/home/a22hugtrigon/web/tr3a22hugtrigon.daw.inspedralbes.cat/public_html
        
      - name: Imprimir estado del trabajo
        run: echo "🍏 This job's status is ${{ job.status }}."
