name: Despliegue a Producción

on:
  push:
    branches:
      - dev_prod

jobs:
  laravel-nuxt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v2

      - name: Instalar dependencias Laravel
        run: |
          cd back/laravel
          composer install
          cp .env.example .env  # Copia el archivo .env si no existe
          php artisan key:generate
          
      - name: Configuración de la base de datos Laravel
        run: |
            cd back/laravel
            php artisan migrate --force
        
          
      - name: Instalar dependencias de Nuxt
        run: |
          cd ../
      - name: Verificar directorio actual
        run: ls
          cd ../
          cd nuxt
      - name: Verificar directorio actual
        run: ls
          npm install

      - name: Build de la aplicación Nuxt
        run: npm run build

